name: plantex_mobile
description: Plantex Shipment mobile app (Flutter) — warehouse + supplier flavors.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # networking
  dio: ^5.4.0

  # state management
  provider: ^6.1.1

  # routing
  go_router: ^14.0.0

  # secure token storage
  flutter_secure_storage: ^9.0.0

  # barcode / qr scanning (camera)
  mobile_scanner: ^5.0.0

  # file + image pickers (vendor invoice PDF, seal image, truck photo)
  file_picker: ^8.0.0
  image_picker: ^1.0.7

  # open PO pdf in browser / external viewer
  url_launcher: ^6.2.5

  # misc
  intl: ^0.19.0

dev_dependencies:
  flutter_lints: ^3.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  # assets:
  #   - assets/images/
